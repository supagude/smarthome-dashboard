<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智能家居远程控制台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1923;color:#e0e0e0;min-height:100vh}
.header{background:#1a2733;padding:16px 24px;border-bottom:2px solid #00d4aa;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#00d4aa}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;padding:20px}
.card{background:#1a2733;border-radius:10px;padding:18px;border:1px solid #2a3a4a}
.card h3{font-size:13px;color:#8899aa;margin-bottom:12px;letter-spacing:1px}
.env-row{display:flex;justify-content:space-around;text-align:center}
.env-val{font-size:34px;font-weight:bold;color:#00d4aa}
.env-label{font-size:12px;color:#667788;margin-top:4px}
.switch-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1f2e3a}
.switch-row:last-child{border:none}
.toggle{position:relative;width:48px;height:26px}
.toggle input{display:none}
.slider{display:block;width:48px;height:26px;background:#2a3a4a;border-radius:26px;cursor:pointer;position:relative;transition:.25s}
.slider::after{content:"";width:20px;height:20px;background:#8899aa;border-radius:50%;position:absolute;top:3px;left:3px;transition:.25s}
input:checked+.slider{background:#00d4aa}
input:checked+.slider::after{transform:translateX(22px);background:#fff}
.temp-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.temp-row button{width:36px;height:36px;border:none;border-radius:8px;background:#2a3a4a;color:#00d4aa;font-size:20px;cursor:pointer}
.temp-row button:active{background:#00d4aa44}
.temp-val{font-size:30px;font-weight:bold;color:#00d4aa;width:46px;text-align:center}
.input-row{display:flex;gap:10px;padding:10px 20px;align-items:center}
.input-row input{flex:1;background:#1a2733;border:1px solid #2a3a4a;color:#e0e0e0;padding:8px 12px;border-radius:6px;font-size:14px}
.input-row button{background:#00d4aa;color:#0f1923;border:none;padding:8px 16px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:13px}
.log{background:#0a151d;border-radius:6px;padding:10px;margin:0 20px 20px;height:130px;overflow-y:auto;font:11px monospace;color:#667788}
.log .tx{color:#ff9800}.log .rx{color:#00d4aa}.log .err{color:#f44336}
.footer{text-align:center;padding:8px;color:#445566;font-size:11px}
.note{color:#667788;font-size:12px;padding:0 20px 10px;text-align:center}
</style>
</head>
<body>

<div class="header">
    <h1>🏠 智能家居远程控制</h1>
</div>

<div class="input-row">
    <input type="text" id="apiKey" placeholder="粘贴 OneNET Access Key（在控制台→安全→访问密钥中获取）">
    <button onclick="saveKey()">保存</button>
</div>

<div class="container">
    <div class="card">
        <h3>🌡 环境数据</h3>
        <div class="env-row">
            <div><div class="env-val" id="temp">--</div><div class="env-label">温度 / ℃</div></div>
            <div><div class="env-val" id="humi">--</div><div class="env-label">湿度 / %</div></div>
        </div>
    </div>

    <div class="card">
        <h3>❄ 空调</h3>
        <div class="switch-row">
            <span style="font-size:14px">电源</span>
            <label class="toggle"><input type="checkbox" id="acOn" onchange="setBool('ac_on',this.checked)"><span class="slider"></span></label>
        </div>
        <div class="temp-row">
            <button onclick="adjTemp(-1)">−</button>
            <div class="temp-val" id="acTemp">26</div>
            <button onclick="adjTemp(+1)">+</button>
            <span style="color:#667788;font-size:12px;margin-left:6px">设定温度</span>
        </div>
    </div>

    <div class="card">
        <h3>💡 灯光</h3>
        <div class="switch-row">
            <span style="font-size:14px">主灯</span>
            <label class="toggle"><input type="checkbox" id="mainLight" onchange="setBool('main_light',this.checked)"><span class="slider"></span></label>
        </div>
        <div class="switch-row">
            <span style="font-size:14px">小夜灯</span>
            <label class="toggle"><input type="checkbox" id="nightLight" onchange="setBool('night_light',this.checked)"><span class="slider"></span></label>
        </div>
    </div>
</div>

<div class="note" id="status">请输入 Access Key 后开始</div>

<div class="log" id="log"></div>
<div class="footer">远程控制台 · OneNET HTTP API · GitHub Pages</div>

<script>
var API_KEY = localStorage.getItem("smarthome_key") || "";
var PRODUCT_ID = "19MG2h6GbF";
var DEVICE_NAME = "esp32";
var API_BASE = "https://iot-api.heclouds.com/thingmanager";
var ac_temp = 26;

if (API_KEY) document.getElementById("apiKey").value = API_KEY;

function saveKey() {
    API_KEY = document.getElementById("apiKey").value.trim();
    localStorage.setItem("smarthome_key", API_KEY);
    log("Access Key 已保存", "rx");
    fetchStatus();
}

function log(msg, cls) {
    var d = document.getElementById("log");
    d.innerHTML += '<div class="'+cls+'">['+new Date().toLocaleTimeString()+'] '+msg+'</div>';
    d.scrollTop = d.scrollHeight;
}

function getHeaders() {
    return { "Content-Type":"application/json", "authorization": API_KEY };
}

/* 查询设备最新属性值 */
function fetchStatus() {
    if (!API_KEY) { document.getElementById("status").textContent="请先输入 Access Key"; return; }
    document.getElementById("status").textContent = "查询中...";

    var body = JSON.stringify({ product_id: PRODUCT_ID, device_name: DEVICE_NAME });

    fetch(API_BASE + "/query-device-property", { method:"POST", headers:getHeaders(), body:body })
    .then(function(r){ return r.json(); })
    .then(function(j){
        document.getElementById("status").textContent = "已连接 OneNET (HTTP API)";
        if (j.code==0 && j.data) {
            for (var k in j.data) {
                var v = j.data[k];
                if (k=="temperature")  document.getElementById("temp").textContent = v;
                if (k=="humidity")     document.getElementById("humi").textContent = v;
                if (k=="ac_temp")      { ac_temp=v; document.getElementById("acTemp").textContent=v; }
                if (k=="ac_on")        document.getElementById("acOn").checked = v;
                if (k=="main_light")   document.getElementById("mainLight").checked = v;
                if (k=="night_light")  document.getElementById("nightLight").checked = v;
            }
        }
    }).catch(function(e){ log("查询失败: "+e.message, "err"); });
}

/* 下发控制指令 */
function sendCmd(params) {
    if (!API_KEY) { log("请先输入 Access Key", "err"); return; }

    var body = JSON.stringify({ product_id:PRODUCT_ID, device_name:DEVICE_NAME, params:params });

    log("发送: " + JSON.stringify(params), "tx");

    fetch(API_BASE + "/set-device-property", { method:"POST", headers:getHeaders(), body:body })
    .then(function(r){ return r.json(); })
    .then(function(j){
        if (j.code==0 || j.code=="0") log("指令已送达 ✓", "rx");
        else log("失败: code="+j.code+" "+JSON.stringify(j.msg||""), "err");
    }).catch(function(e){ log("发送失败: "+e.message, "err"); });
}

function setBool(name, val) {
    var p = {}; p[name] = val; sendCmd(p);
}
function adjTemp(delta) {
    ac_temp = Math.max(16, Math.min(30, ac_temp + delta));
    document.getElementById("acTemp").textContent = ac_temp;
    sendCmd({ ac_temp: ac_temp });
}

setInterval(fetchStatus, 3000);
fetchStatus();
</script>
</body>
</html>
